openapi: 3.1.0
paths:
  /api/v1/fares:
    get:
      operationId: getFares
      tags: [Fares]
      summary: Tarifas, abonos y puntos de recarga
      description: |
        Obtiene la información vigente sobre los costes del billete individual y las modalidades de abono (Tarjeta Transporte, Carnet Joven, etc.).
        
        Incluye un listado de **puntos de recarga físicos** (estancos, quioscos) distribuidos por la ciudad de Santander.
      responses:
        200:
          description: Información de tarifas recuperada.
          content:
            application/json:
              example:
                fares:
                  - id: "estandar"
                    name: "Tarjeta estándar recargable"
                    description: "Tarjeta monedero para uso general."
                    price_per_trip: 0.60
                    color: "#1A73E8"
                    features:
                      - title: "Recargable"
                        detail: "Mínimo 6€"
                recharge_points:
                  - name: "Estanco N1"
                    address: "Calvo Sotelo, 1"
                    location: { lat: 43.4621, lng: -3.8041 }
              schema:
                type: object
                properties:
                  fares:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        description: { type: string }
                        price_per_trip: { type: number, nullable: true }
                        color: { type: string }
                        features:
                          type: array
                          items:
                            type: object
                            properties:
                              title: { type: string }
                              detail: { type: string }
                  recharge_points:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        address: { type: string }
                        location: { $ref: '#/components/schemas/Coordinate' }

  /api/v1/fares/calculator:
    get:
      operationId: calculateFare
      tags: [Fares]
      summary: Recomendador de abonos y ahorro
      parameters:
        - in: query
          name: trips
          required: true
          schema: { type: integer }
        - in: query
          name: age
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Comparativa de costes mensuales.
          content:
            application/json:
              example:
                trips_per_month: 20
                options:
                  - id: "estandar"
                    name: "Tarjeta estándar"
                    monthly_cost: 12.0
                    eligible: true
