openapi: 3.0.0
paths:
  /api/v1/lines:
    get:
      tags: [Core]
      summary: Catálogo completo de líneas de autobús
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  lines:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        color:
                          type: string
                        text_color:
                          type: string
                        destinations:
                          type: array
                          items:
                            type: string
                        stops:
                          type: number
                        has_schedule:
                          type: boolean
                        active:
                          type: boolean
                  total:
                    type: number
                  updated:
                    type: string
                    format: date-time
              example:
                lines:
                  - id: "1"
                    name: "Pcta. Juan Carlos I - Adarzo"
                    color: "#E30613"
                    text_color: "#FFFFFF"
                    destinations: ["Adarzo", "Pcta. Juan Carlos I"]
                    stops: 38
                    has_schedule: true
                    active: true
                  - id: "LC"
                    name: "Línea Centro"
                    color: "#00A650"
                    text_color: "#FFFFFF"
                    destinations: ["Estaciones", "Estaciones"]
                    stops: 12
                    has_schedule: true
                    active: true
                  - id: "N1"
                    name: "Búho 1"
                    color: "#1D1D1B"
                    text_color: "#FFFFFF"
                    destinations: ["El Sardinero", "Corban"]
                    stops: 42
                    has_schedule: false
                    active: true
                total: 3
                updated: "2025-01-01T00:00:00.000Z"
        500:
          description: Internal error
          content:
            application/json:
              schema:
                type: object

  /api/v1/lines/{line}:
    get:
      tags: [Core]
      summary: Detalle de una línea específica
      parameters:
        - in: path
          name: line
          required: true
          schema:
            type: string
          description: "ID de línea (ej: LC, 1, N1)"
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  color:
                    type: string
                  text_color:
                    type: string
                  schedule_id:
                    type: string
                    nullable: true
                  destinations:
                    type: object
                    properties:
                      "1":
                        type: string
                      "2":
                        type: string
                  stats:
                    type: object
                    properties:
                      stops_total:
                        type: number
                      stops_direction_1:
                        type: number
                      stops_direction_2:
                        type: number
                  has_schedule:
                    type: boolean
                  active:
                    type: boolean
        404:
          description: Line not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: line_not_found
                  message:
                    type: string
        500:
          description: Internal error
          content:
            application/json:
              schema:
                type: object

  /api/v1/lines/{line}/route:
    get:
      tags: [Core]
      summary: Ruta completa de una línea con coordenadas GPS
      parameters:
        - in: path
          name: line
          required: true
          schema:
            type: string
          description: ID de línea
        - in: query
          name: direction
          required: false
          schema:
            type: string
            default: all
          description: "1, 2, o all (default)"
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  line:
                    type: string
                  color:
                    type: string
                  directions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        destination:
                          type: string
                        stops:
                          type: array
                          items:
                            type: object
                            properties:
                              stopId:
                                type: number
                              name:
                                type: string
                              lat:
                                type: number
                              lng:
                                type: number
                              sentido:
                                type: string
                                nullable: true
                              lines:
                                type: array
                                items:
                                  type: string
                              source:
                                type: string
        404:
          description: Line not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: line_not_found
        500:
          description: Internal error
          content:
            application/json:
              schema:
                type: object

  /api/v1/lines/{lineA}/intersect/{lineB}:
    get:
      tags: [Compare]
      summary: Paradas comunes entre dos líneas
      parameters:
        - in: path
          name: lineA
          required: true
          schema:
            type: string
          description: ID de la primera línea
        - in: path
          name: lineB
          required: true
          schema:
            type: string
          description: ID de la segunda línea
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  line_a:
                    type: string
                  line_b:
                    type: string
                  common_stops:
                    type: array
                    items:
                      type: number
                  total:
                    type: number
        500:
          description: Internal error
          content:
            application/json:
              schema:
                type: object
