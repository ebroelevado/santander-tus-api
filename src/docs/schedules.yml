openapi: 3.0.0
paths:
  /api/v1/schedule/lines/{line}:
    get:
      tags: [Schedules]
      summary: Horarios programados de una línea
      parameters:
        - in: path
          name: line
          required: true
          schema:
            type: string
        - in: query
          name: day
          schema:
            type: string
            default: L
          description: "L/S/F"
        - in: query
          name: direction
          schema:
            type: string
            default: "1"
          description: "1/2"
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  line:
                    type: string
                  direction:
                    type: string
                  day:
                    type: string
                  day_name:
                    type: string
                  times:
                    type: array
                    items:
                      type: string
                  total:
                    type: integer
                  first:
                    type: string
                  last:
                    type: string
                  frequency_min:
                    type: integer
                    nullable: true
                  source:
                    type: string

  /api/v1/schedule/lines/{line}/next:
    get:
      tags: [Schedules]
      summary: Próximo horario programado desde ahora
      parameters:
        - in: path
          name: line
          required: true
          schema:
            type: string
        - in: query
          name: day
          schema:
            type: string
            default: L
        - in: query
          name: direction
          schema:
            type: string
            default: "1"
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/v1/schedule/stops/{stop}:
    get:
      tags: [Schedules]
      summary: Horarios de todas las líneas en esta parada
      parameters:
        - in: path
          name: stop
          required: true
          schema:
            type: integer
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
