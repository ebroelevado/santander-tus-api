paths:
  /api/v1/trip:
    get:
      tags: [Trip]
      summary: Planificar viaje entre dos paradas (directo y transbordo)
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: integer
        - in: query
          name: to
          required: true
          schema:
            type: integer
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  from:
                    type: object
                  to:
                    type: object
                  options:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [direct, transfer]
                        line:
                          type: string
                        color:
                          type: string
                        stops:
                          type: integer
                        direction:
                          type: string
                        duration_min:
                          type: integer
                          nullable: true

  /api/v1/stops/{stop}/connections:
    get:
      tags: [Trip]
      summary: Paradas alcanzables sin transbordo desde esta parada
      parameters:
        - in: path
          name: stop
          required: true
          schema:
            type: integer
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
