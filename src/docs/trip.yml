openapi: 3.1.0
paths:
  /api/v1/trip/plan:
    get:
      tags: [Trip]
      summary: Planificador intermodal de viajes (A a B)
      description: |
        Calcula la ruta óptima en autobús y a pie entre un origen y un destino.
        Se apoya en **OpenTripPlanner (OTP)** internamente. Permite ajustar si quieres minimizar transbordos o caminar menos.
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
          description: "Coordenadas de origen (`lat,lng`)"
        - in: query
          name: to
          required: true
          schema:
            type: string
          description: "Coordenadas de destino (`lat,lng`)"
        - in: query
          name: time
          required: false
          schema:
            type: string
          description: "Hora de salida (`HH:mm`). Por defecto ahora."
        - in: query
          name: date
          required: false
          schema:
            type: string
          description: "Fecha de salida (`YYYY-MM-DD`). Por defecto hoy."
        - in: query
          name: mode
          required: false
          schema:
            type: string
            default: TRANSIT,WALK
          description: "Modos de transporte permitidos."
      responses:
        200:
          description: Itinerarios encontrados
          content:
            application/json:
              schema:
                type: object

  /api/v1/trip/connections/{stop}:
    get:
      tags: [Trip]
      summary: Conexiones Isócronas desde una parada
      description: |
        Descubre hasta dónde puedes llegar en un máximo de X minutos desde una parada específica.
        Excelente para mapas de calor o calculadoras de isócronas.
      parameters:
        - in: path
          name: stop
          required: true
          schema:
            type: integer
          description: ID de la parada de origen
        - in: query
          name: maxMinutes
          required: false
          schema:
            type: integer
            default: 30
          description: "Minutos máximos de viaje."
      responses:
        200:
          description: Paradas alcanzables
          content:
            application/json:
              schema:
                type: object
