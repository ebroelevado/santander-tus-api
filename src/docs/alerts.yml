openapi: 3.1.0
paths:
  /api/v1/alerts:
    get:
      tags: [Alerts]
      summary: Alertas de servicio y avisos
      description: |
        Cortes de tráfico programados, eventos especiales (ej. cabalgatas, maratones) o incidencias técnicas que afecten a la red.
        Esencial para mostrar "banners" amarillos en el frontend cuando hay problemas serios.
      responses:
        200:
          description: OK
          content:
            application/json:
              example:
                active_alerts:
                  - id: "EV-102"
                    title: "Corte en Paseo Pereda"
                    description: "Debido a la maratón de la ciudad, de 10:00 a 14:00 las líneas 1, 2, 3 y 4 se desvían por el túnel de Tetuán."
                    severity: "high"
                    affected_lines: ["1", "2", "3", "4"]
              schema:
                type: object
