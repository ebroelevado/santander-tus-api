openapi: 3.1.0
paths:
  /api/v1/health:
    get:
      tags: [Core]
      summary: Healthcheck del sistema
      description: |
        Comprueba que la API está online, así como el estado de caché del Open Data y otras dependencias críticas.
      responses:
        200:
          description: Todo OK
          content:
            application/json:
              example:
                status: "UP"
                version: "2.1.0"
                cache: { "stops": true, "lines": true }
              schema:
                type: object

  /api/v1/discover:
    get:
      tags: [Core]
      summary: HATEOAS Discovery
      description: Devuelve la lista de endpoints disponibles en formato HATEOAS.
      responses:
        200:
          description: Endpoints disponibles
          content:
            application/json:
              schema:
                type: object

  /api/v1/dx/errors:
    get:
      tags: [DX]
      summary: Simulador de errores
      description: Lanza un error intencionado para que puedas testear tu UI manejando excepciones (ej. HTTP 500).
      responses:
        500:
          description: Error simulado
          content:
            application/json:
              schema:
                type: object
