openapi: 3.1.0
paths:
  /api/v1/now:
    get:
      operationId: getServerTime
      tags: [Time]
      summary: Reloj maestro de la red TUS
      description: |
        Sincroniza tu aplicación con la hora oficial del sistema de transporte. 
        
        Este endpoint es crítico para:
        1. **Cálculos de ETD**: Calcular con precisión cuántos segundos faltan para que un bus llegue.
        2. **Sincronización**: Evitar discrepancias si el reloj del dispositivo del usuario está desajustado.
        
        La hora se devuelve en formato ISO 8601 con zona horaria de Madrid.
      responses:
        200:
          description: Hora actual del servidor.
          content:
            application/json:
              example:
                server_time: "2026-05-03T20:30:00.000Z"
                timezone: "Europe/Madrid"
                timestamp_ms: 1714768200000
              schema:
                type: object
                properties:
                  server_time:
                    type: string
                    format: date-time
                  timezone:
                    type: string
                  timestamp_ms:
                    type: integer

  /api/v1/stops/{stop}/etd:
    get:
      operationId: getStopETD
      tags: [Time]
      summary: Tiempo estimado de paso (ETD)
      description: |
        Calcula la hora exacta de llegada (ISO 8601) sumando los minutos de la estimación en tiempo real a la hora actual del servidor.
      parameters:
        - in: path
          name: stop
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Estimaciones calculadas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  stop: { type: object }
                  server_time: { type: string }
                  arrivals:
                    type: array
                    items:
                      type: object
                      properties:
                        line: { type: string }
                        destination: { type: string }
                        minutes: { type: integer, nullable: true }
                        etd: { type: string, nullable: true }
